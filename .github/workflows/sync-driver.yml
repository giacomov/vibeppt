name: Sync Driver

on:
  pull_request:
    types: [closed]

jobs:
  sync:
    name: Sync plan to GitHub Issues
    if: |
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'plan')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - uses: astral-sh/setup-uv@v4

      - name: Install shipyard
        run: uv tool install "git+https://github.com/giacomov/shipyard@0.1.0"

      - name: Extract issue number from branch
        id: extract
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          ISSUE=$(echo "$BRANCH" | sed 's|plan/i||')
          echo "issue_number=${ISSUE}" >> "$GITHUB_OUTPUT"

      - name: Generate tasks.json from plan
        env:
          GH_TOKEN: ${{ github.token }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          ISSUE="${{ steps.extract.outputs.issue_number }}"
          ISSUE_TITLE=$(gh issue view "$ISSUE" --repo "${{ github.repository }}" --json title --jq '.title')
          shipyard tasks -i "plans/i${ISSUE}.md" -o tasks.json --title "Implementation: ${ISSUE_TITLE}"

      - name: Sync tasks to GitHub Issues
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          shipyard sync -i tasks.json --no-in-progress-label \
            --repo "${{ github.repository }}"
