name: Coverage Comment

on:
  workflow_run:
    workflows: [Tests]
    types: [completed]

jobs:
  comment:
    name: Post coverage comment
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'

    permissions:
      pull-requests: write

    steps:
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Post coverage comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const prNumber = parseInt(fs.readFileSync('pr-number.txt', 'utf8').trim(), 10)
            const summary = JSON.parse(fs.readFileSync('coverage-summary.json', 'utf8'))
            const total = summary.total

            const pct = key => `${total[key].pct}%`
            const body = [
              '## Coverage Report',
              '| Metric | Coverage |',
              '|--------|----------|',
              `| Lines | ${pct('lines')} |`,
              `| Statements | ${pct('statements')} |`,
              `| Functions | ${pct('functions')} |`,
              `| Branches | ${pct('branches')} |`,
            ].join('\n')

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            })
            const existing = comments.find(c => c.body.startsWith('## Coverage Report'))
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              })
            }
