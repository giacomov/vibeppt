name: Epic Driver

on:
  issues:
    types: [labeled]
  pull_request:
    types: [closed]

jobs:
  drive-epic:
    if: |
      (github.event_name == 'issues' &&
       github.event.label.name == 'in-progress' &&
       github.event.issue.pull_request == null) ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
      workflows: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Find epic and unblocked issues
        id: find-work
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node scripts/find-epic-work.mjs

      - name: Run Claude Code
        if: steps.find-work.outputs.has_work == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ steps.find-work.outputs.prompt }}
          claude_args: "--allowedTools Bash(*),Edit,Write,Glob,Grep,Read,WebSearch,WebFetch"
