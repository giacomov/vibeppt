name: Epic Driver

on:
  issues:
    types: [labeled]
  pull_request:
    types: [closed]

jobs:
  drive-epic:
    if: |
      (github.event_name == 'issues' &&
       github.event.label.name == 'in-progress' &&
       github.event.issue.pull_request == null) ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Find epic and unblocked issues
        id: find-work
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            // ----------------------------------------------------------------
            // 1. Resolve the epic issue number
            // ----------------------------------------------------------------
            let epicNumber;

            if (context.eventName === 'issues') {
              // The labeled issue is the epic itself.
              epicNumber = context.payload.issue.number;

            } else {
              // PR merged — find the epic by looking up the parent of each
              // issue closed by this PR.
              const prBody = context.payload.pull_request.body || '';
              const closingRe = /(?:closes?|fixes?|resolves?)\s+#(\d+)/gi;
              const closedNumbers = [];
              let m;
              while ((m = closingRe.exec(prBody)) !== null) {
                closedNumbers.push(parseInt(m[1], 10));
              }

              if (closedNumbers.length === 0) {
                core.info('PR body contains no closing references — nothing to do.');
                core.setOutput('has_work', 'false');
                return;
              }

              // Query GraphQL for the parent of each closed issue.
              for (const n of closedNumbers) {
                try {
                  const result = await github.graphql(`
                    query($owner: String!, $repo: String!, $number: Int!) {
                      repository(owner: $owner, name: $repo) {
                        issue(number: $number) {
                          parent {
                            number
                            labels(first: 20) { nodes { name } }
                          }
                        }
                      }
                    }
                  `, { owner, repo, number: n });

                  const parent = result.repository.issue.parent;
                  if (parent && parent.labels.nodes.some(l => l.name === 'in-progress')) {
                    epicNumber = parent.number;
                    break;
                  }
                } catch (e) {
                  core.warning(`GraphQL parent lookup failed for #${n}: ${e.message}`);
                }
              }

              // Fallback: search open issues labeled "in-progress" and find one
              // whose sub-issues include a closed issue from this PR.
              if (!epicNumber) {
                core.info('GraphQL parent lookup found nothing — falling back to label search.');
                const candidates = await github.rest.issues.listForRepo({
                  owner, repo,
                  state: 'open',
                  labels: 'in-progress',
                  per_page: 50,
                });
                for (const candidate of candidates.data) {
                  const subs = await github.request(
                    'GET /repos/{owner}/{repo}/issues/{issue_number}/sub_issues',
                    { owner, repo, issue_number: candidate.number }
                  );
                  const subNumbers = subs.data.map(s => s.number);
                  if (closedNumbers.some(n => subNumbers.includes(n))) {
                    epicNumber = candidate.number;
                    break;
                  }
                }
              }

              if (!epicNumber) {
                core.info('Could not find an in-progress epic for this PR — nothing to do.');
                core.setOutput('has_work', 'false');
                return;
              }
            }

            core.info(`Epic: #${epicNumber}`);

            // ----------------------------------------------------------------
            // 2. Fetch the epic issue
            // ----------------------------------------------------------------
            const epic = await github.rest.issues.get({
              owner, repo, issue_number: epicNumber,
            });

            // ----------------------------------------------------------------
            // 3. Fetch all sub-issues and find unblocked open ones
            // ----------------------------------------------------------------
            const subsResponse = await github.request(
              'GET /repos/{owner}/{repo}/issues/{issue_number}/sub_issues',
              { owner, repo, issue_number: epicNumber }
            );
            const openSubs = subsResponse.data.filter(s => s.state === 'open');

            if (openSubs.length === 0) {
              core.info('All sub-issues are closed — epic is complete.');
              core.setOutput('has_work', 'false');
              return;
            }

            const unblocked = [];
            for (const sub of openSubs) {
              const blockers = await github.request(
                'GET /repos/{owner}/{repo}/issues/{issue_number}/dependencies/blocked_by',
                { owner, repo, issue_number: sub.number }
              );
              const openBlockers = blockers.data.filter(b => b.state === 'open');
              if (openBlockers.length === 0) {
                unblocked.push(sub);
              }
            }

            if (unblocked.length === 0) {
              core.info('No unblocked sub-issues — waiting for blockers to resolve.');
              core.setOutput('has_work', 'false');
              return;
            }

            core.info(`Unblocked issues: ${unblocked.map(u => '#' + u.number).join(', ')}`);

            // ----------------------------------------------------------------
            // 4. Build the prompt for Claude Code
            // ----------------------------------------------------------------
            const issueList = unblocked.map(u =>
              `- #${u.number}: ${u.title}\n${(u.body || '').trim()}`
            ).join('\n\n');

            const prompt = `\
You are working on the GitHub repository ${owner}/${repo}.

EPIC #${epicNumber}: ${epic.data.title}
${(epic.data.body || '').trim()}

The following sub-issues are ready to be implemented (all their blockers are resolved):

${issueList}

Instructions:
1. Implement the changes required to complete each issue listed above.
2. You may use parallel sub-agents if that helps complete the work faster.
3. When done, open a single pull request targeting the main branch.
4. The PR body MUST include "closes #<number>" for every issue you have addressed.
5. Do not work on issues that are not listed above.
`;

            core.setOutput('has_work', 'true');
            core.setOutput('prompt', prompt);

      - name: Run Claude Code
        if: steps.find-work.outputs.has_work == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ steps.find-work.outputs.prompt }}
          additional_permissions: |
            actions: read
